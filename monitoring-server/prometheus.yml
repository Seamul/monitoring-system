global:
  scrape_interval: 15s

scrape_configs:

  # FastAPI
  - job_name: 'fastapi'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 172.16.5.7:8000

  # Django
  - job_name: 'django'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 172.16.5.7:8009

  # Node Exporter
  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - 172.16.5.7:9100