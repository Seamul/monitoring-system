server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: fastapi_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: fastapi
          server: app-server-1
          app: my-fastapi
          __path__: /var/log/*.log
